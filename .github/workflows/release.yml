name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../yelo-${{ matrix.target }}.tar.gz yelo
      - uses: actions/upload-artifact@v7
        with:
          name: yelo-${{ matrix.target }}
          path: yelo-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            yelo-*.tar.gz

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          MAC_ARM_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/yelo-aarch64-apple-darwin.tar.gz"
          MAC_X86_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/yelo-x86_64-apple-darwin.tar.gz"
          LINUX_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/yelo-x86_64-unknown-linux-gnu.tar.gz"

          # Download and compute checksums
          curl -fsSL "$MAC_ARM_URL" -o mac-arm.tar.gz
          curl -fsSL "$MAC_X86_URL" -o mac-x86.tar.gz
          curl -fsSL "$LINUX_URL" -o linux.tar.gz
          MAC_ARM_SHA="$(sha256sum mac-arm.tar.gz | cut -d' ' -f1)"
          MAC_X86_SHA="$(sha256sum mac-x86.tar.gz | cut -d' ' -f1)"
          LINUX_SHA="$(sha256sum linux.tar.gz | cut -d' ' -f1)"

          # Generate formula
          cat > Formula/yelo.rb <<FORMULA
          class Yelo < Formula
            desc "FTP-style CLI for Amazon S3 and Glacier"
            homepage "https://github.com/${{ github.repository }}"
            version "$VERSION"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "$MAC_ARM_URL"
                sha256 "$MAC_ARM_SHA"
              else
                url "$MAC_X86_URL"
                sha256 "$MAC_X86_SHA"
              end
            end

            on_linux do
              url "$LINUX_URL"
              sha256 "$LINUX_SHA"
            end

            def install
              bin.install "yelo"
              man1.install "doc/yelo.1" if File.exist? "doc/yelo.1"
            end

            test do
              assert_match "yelo #{version}", shell_output("#{bin}/yelo --version")
            end
          end
          FORMULA

          git add Formula/yelo.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update Homebrew formula to $VERSION" || true
          git push || true
